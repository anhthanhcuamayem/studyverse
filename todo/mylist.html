<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- SỬA LẠI ĐƯỜNG DẪN CSS -->
    <link rel="stylesheet" href="mylist.css">
    <link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body style="visibility: hidden;">

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Study<span>verse</span></a>
            
            <nav class="navigation">
                <ul>
                    <li class="list" id="li-create" data-index="0" >
                        <a href="../index.html">
                            <span class="icon"><i class="fa-solid fa-house"></i></span>
                            <span class="text">Home</span>
                        </a>
                    </li>
                    <li class="list active" id="li-create" data-index="1">
                        <a href="mylist.html"> 
                            <span class="icon"><i class="fa-solid fa-list-check"></i></span>
                            <span class="text">My Project</span>
                        </a>
                    </li>
                    <li class="list" id="li-create" data-index="2">
                        <a href="create.html">
                            <span class="icon"><i class="fa-solid fa-plus"></i></span>
                            <span class="text">Create</span>
                        </a>
                    </li>
                    <div class="indicator"></div>
                </ul>
            </nav>
        </div>
    </header>  

    <main>
    <div class="project-wrapper">
        <aside class="project-sidebar">
            <div class="sidebar-header">
                <h2>My Projects</h2>
                <button class="btn-new-project">+ New Project</button>
            </div>
            <div class="sidebar-list">
                </div>
        </aside>

        <section class="project-detail">
            <div class="detail-card">
                <div class="detail-header" style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <h2 id="mainProjectName" style="margin: 0;">My Projects</h2>
                        <i class="fa-solid fa-pen btn-edit-name" style="cursor: pointer; font-size: 14px; color: rgba(255,255,255,0.3); display: none;" title="Sửa tên"></i>
                    </div>
                    
                    <div style="display: flex; align-items: center; gap: 10px; font-size: 14px; color: rgba(255,255,255,0.5); font-weight: 500;">
                        <span id="mainProjectDeadline"></span>
                        <i class="fa-solid fa-pen btn-edit-deadline" style="cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.3); display: none;" title="Sửa hạn chót"></i>
                    </div>
                </div> 
                
                <div id="taskAreaContainer" style="display: none;">
                    
                    <p id="mainProjectDeadline"></p>
                    <div id="displayTaskList" style="margin-bottom: 10px;"></div>

                    <div class="add-task-btn" id="btnShowInput" style="display: flex; align-items: center; gap: 10px; cursor: pointer; width: fit-content; opacity: 0.6; padding: 5px 0;">
                        <i class="fa-solid fa-plus" style="color: #db4c3f; font-size: 16px;"></i>
                        <span style="color: #808080; font-size: 15px;">Add task</span>
                    </div>

                    <div id="taskInputCard" style="display: none; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; margin-top: 5px;">
    
                        <input type="text" id="taskNameInput" placeholder="Tên công việc..." style="width: 100%; background: transparent; border: none; color: white; font-size: 15px; outline: none; margin-bottom: 8px;">
                        
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                            <i class="fa-regular fa-clock" style="color: #ffffff; font-size: 17px;"></i>
                            <input type="text" id="taskDeadlineInput" placeholder="Deadline (VD: 20/10 hoặc Thứ 2)..." style="background: transparent; border: none; color: #ffffff; font-size: 13px; outline: none; width: 100%;">
                        </div>

                        <div style="display: flex; justify-content: flex-end; gap: 8px;">
                            <button id="btnCancelTask" style="background: transparent; color: #808080; border: none; padding: 5px 10px; cursor: pointer; font-size: 13px;">Hủy</button>
                            <button id="btnSaveTask" style="background: #db4c3f; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: 600;">Add task</button>
                        </div>
                    </div>

                </div>
            </div>


    
        </section>
    </div>
    
    </main>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Project</h3>
                <p>Tạo một không gian học tập mới</p>
            </div>
            <div class="input-group">
                <label for="projectNameInput">Tên dự án</label>
                <input type="text" id="projectNameInput" placeholder="Ví dụ: Học Tiếng Anh,...">
            </div>
            <div class="input-group" style="margin-top: 15px;">
                <label for="projectDeadlineInput">Hạn chót (Deadline)</label>
                <input type="date" id="projectDeadlineInput" style="font : 20px; width: 100%; padding: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white;">
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" id="btnCancel">Hủy</button>
                <button class="btn-modal btn-confirm" id="btnConfirm">Tạo ngay</button>
            </div>
            
        </div>
    </div>
    
    <!-- SỬA LẠI ĐƯỜ    NG DẪN JS -->
    <script src="mylist.js"></script>
</body>
</html>
