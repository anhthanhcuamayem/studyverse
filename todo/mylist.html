<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- SỬA LẠI ĐƯỜNG DẪN CSS -->
    <link rel="stylesheet" href="mylist.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Study<span>verse</span></a>
            
            <nav class="navigation">
                <ul>
                    <li class="list" id="li-create" data-index="0" >
                        <a href="../index.html">
                            <span class="icon"><i class="fa-solid fa-house"></i></span>
                            <span class="text">Home</span>
                        </a>
                    </li>
                    <li class="list active" id="li-create" data-index="1">
                        <a href="mylist.html"> 
                            <span class="icon"><i class="fa-solid fa-list-check"></i></span>
                            <span class="text">My Project</span>
                        </a>
                    </li>
                    <li class="list" id="li-create" data-index="2">
                        <a href="create.html">
                            <span class="icon"><i class="fa-solid fa-plus"></i></span>
                            <span class="text">Create</span>
                        </a>
                    </li>
                    <div class="indicator"></div>
                </ul>
            </nav>
        </div>
    </header>  

    <main>
    <div class="project-wrapper">
        <aside class="project-sidebar">
            <div class="sidebar-header">
                <h2>My Projects</h2>
                <button class="btn-new-project">+ New Project</button>
            </div>
            <div class="sidebar-list">
                </div>
        </aside>

        <section class="project-detail">
            <div class="detail-card">
                <div class="detail-header">
                    <h2>My Projects</h2>
                </div>
                
            </div>
        </section>
    </div>
    </main>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Project</h3>
                <p>Tạo một không gian học tập mới</p>
            </div>
            <div class="input-group">
                <label for="projectNameInput">Tên dự án</label>
                <input type="text" id="projectNameInput" placeholder="Ví dụ: Học Tiếng Anh, Dự án Web...">
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" id="btnCancel">Hủy</button>
                <button class="btn-modal btn-confirm" id="btnConfirm">Tạo ngay</button>
            </div>
        </div>
    </div>
    <!-- SỬA LẠI ĐƯỜ    NG DẪN JS -->
    <script src="mylist.js"></script>
</body>
</html>
