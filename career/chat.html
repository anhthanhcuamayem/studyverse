<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Career Counseling Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/career/chat.css">
</head>
<body>

<header class="navbar">
    <div class="nav-container">
        <a href="/" class="logo">Study<span>verse</span></a>
        <nav class="navigation">
            <ul>
                <li class="list" data-index="0">
                    <a href="/index.html">
                        <span class="icon"><i class="fa-solid fa-house"></i></span>
                        <span class="text">Home</span>
                    </a>
                </li>
                <li class="list" data-index="1">
                    <a href="/todo/mylist.html">
                        <span class="icon"><i class="fa-solid fa-list-check"></i></span>
                        <span class="text">My project</span>
                    </a>
                </li>
                <li class="list" data-index="2">
                    <a href="/schedule/create.html">
                        <span class="icon"><i class="fa-regular fa-calendar"></i></span>
                        <span class="text">Schedule</span>
                    </a>
                </li>
                <li class="list active" data-index="3">
                    <a href="#">
                        <span class="icon"><i class="fa-regular fa-comment-dots"></i></span>
                        <span class="text">AI Career</span>
                    </a>
                </li>
                <div class="indicator"></div>
            </ul>
        </nav>
    </div>
</header>

<main class="main-career">
    <div class="container">
        <div class="chat-card">
            <div class="chat-header">
                <div class="header-info">
                    <i class="fa-solid fa-robot" style="color: var(--primary-blue); font-size: 28px;"></i>
                    <div>
                        <h2>AI Career Advisor</h2>
                        <p>Trợ lý tư vấn hướng nghiệp thông minh</p>
                    </div>
                </div>
                <button class="btn-reset" id="resetChatBtn"><i class="fa-regular fa-trash-can"></i> </button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <textarea id="userInput" rows="1" placeholder="Nhập câu hỏi của bạn..."></textarea>
                <button id="sendBtn" class="btn-send"><i class="fa-regular fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>
</main>

<script src="/script.js"></script>
<script>
// Ghi đè indicator cho trang career để đảm bảo hoạt động đúng
(function() {
    const list = document.querySelectorAll('.list');
    const indicator = document.querySelector('.indicator');
    const nav = document.querySelector('.navigation');
    if (!indicator) return;

    function moveTo(el, transition = '0.3s') {
        if (!el) return;
        indicator.style.transition = `transform ${transition} ease-out`;
        indicator.style.transform = `translateX(${el.offsetLeft}px)`;
    }

    function resetToActive() {
        const active = document.querySelector('.list.active');
        if (active) moveTo(active, '0.3s');
    }

    // Gắn sự kiện hover
    list.forEach(item => {
        item.addEventListener('mouseenter', () => moveTo(item, '0.2s'));
    });
    if (nav) nav.addEventListener('mouseleave', resetToActive);

    // Xử lý khi click để cập nhật active (hỗ trợ chuyển trang)
    list.forEach(item => {
        const link = item.querySelector('a');
        if (link && link.getAttribute('href') !== '#') {
            link.addEventListener('click', (e) => {
                // Không preventDefault để trình duyệt chuyển trang bình thường
                // Nhưng cần cập nhật active trước khi chuyển
                list.forEach(l => l.classList.remove('active'));
                item.classList.add('active');
                moveTo(item, '0.2s');
                // Để trang kịp chuyển, không cần setTimeout vì sẽ load lại trang mới
            });
        }
    });

    // Khởi tạo vị trí ban đầu
    resetToActive();
    window.addEventListener('resize', resetToActive);
})();

// Chat logic
document.addEventListener('DOMContentLoaded', () => {
    const sendBtn = document.getElementById('sendBtn');
    const userInput = document.getElementById('userInput');
    const chatMessages = document.getElementById('chatMessages');
    const resetBtn = document.getElementById('resetChatBtn');

    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerHTML = isUser ? '<i class="fa-regular fa-user"></i>' : '<i class="fa-solid fa-brain"></i>';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'content';
        const p = document.createElement('p');
        p.textContent = text;
        contentDiv.appendChild(p);
        messageDiv.appendChild(avatar);
        messageDiv.appendChild(contentDiv);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendToAI(message) {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="avatar"><i class="fa-solid fa-brain"></i></div><div class="content"><p><i class="fa-regular fa-spinner fa-pulse"></i> AI đang suy nghĩ...</p></div>`;
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const response = await fetch('/api/career-ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            typingDiv.remove();
            if (data.success) {
                addMessage(data.reply, false);
            } else {
                addMessage("Xin lỗi, tôi gặp lỗi: " + (data.error || "Không xác định"), false);
            }
        } catch (error) {
            typingDiv.remove();
            console.error(error);
            addMessage("Lỗi kết nối đến server. Vui lòng thử lại sau.", false);
        }
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage(text, true);
        userInput.value = '';
        userInput.style.height = 'auto';
        await sendToAI(text);
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    resetBtn.addEventListener('click', () => {
        if (confirm('Bạn có chắc chắn muốn xóa toàn bộ lịch sử chat?')) {
            chatMessages.innerHTML = '';
            addMessage("Chào bạn! Tôi là AI Career Advisor. Hãy cho tôi biết sở thích, điểm mạnh, hoặc ngành học bạn quan tâm, tôi sẽ gợi ý các nghề nghiệp phù hợp. Ví dụ: \"Tôi thích toán và lập trình\", \"Em mê vẽ và thiết kế\", \"Làm sao để trở thành bác sĩ?\"...", false);
        }
    });

    addMessage("Chào bạn! Tôi là AI Career Advisor. Hãy cho tôi biết sở thích, điểm mạnh, hoặc ngành học bạn quan tâm, tôi sẽ gợi ý các nghề nghiệp phù hợp. Ví dụ: \"Tôi thích toán và lập trình\", \"Em mê vẽ và thiết kế\", \"Làm sao để trở thành bác sĩ?\"...", false);
});
</script>
<script src="/todo/mylist.js"></script>
</body>
</html>
