<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVerse - AI Career</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .main-career { padding-top: 160px; padding-bottom: 60px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }
        .chat-card { background: #0d1117; border-radius: 32px; border: 1px solid rgba(255,255,255,0.08); overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 220px); min-height: 500px; }
        .chat-header { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        .header-info { display: flex; gap: 16px; align-items: center; }
        .header-info h2 { color: white; font-size: 1.5rem; }
        .header-info p { color: #aaa; }
        .btn-reset { background: rgba(255,77,77,0.2); border: 1px solid #ff4d4d; color: #ff9999; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .btn-reset:hover { background: #ff4d4d; color: white; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; gap: 12px; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 36px; height: 36px; background: #007AFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .user .avatar { background: #2c3e66; }
        .content { background: rgba(255,255,255,0.05); border-radius: 18px; padding: 12px 18px; color: white; }
        .user .content { background: #007AFF; }
        .chat-input-area { padding: 20px 24px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 12px; background: #0d1117; }
        .chat-input-area textarea { flex: 1; background: #1e1e2f; border: none; border-radius: 24px; padding: 12px 18px; color: white; resize: none; font-family: inherit; }
        .btn-send { background: #007AFF; border: none; border-radius: 40px; padding: 0 24px; color: white; cursor: pointer; }
        @media (max-width: 768px) { .main-career { padding-top: 130px; } .chat-card { height: calc(100vh - 170px); } }
    </style>
</head>
<body>
<header class="navbar">
    <div class="nav-container">
        <a href="/" class="logo">Study<span>verse</span></a>
        <nav class="navigation">
            <ul>
                <li class="list" data-index="0"><a href="/index.html"><span class="icon"><i class="fa-solid fa-house"></i></span><span class="text">Home</span></a></li>
                <li class="list" data-index="1"><a href="/todo/mylist.html"><span class="icon"><i class="fa-solid fa-list-check"></i></span><span class="text">My project</span></a></li>
                <li class="list" data-index="2"><a href="/schedule/create.html"><span class="icon"><i class="fa-regular fa-calendar"></i></span><span class="text">Schedule</span></a></li>
                <li class="list active" data-index="3"><a href="#"><span class="icon"><i class="fa-regular fa-comment-dots"></i></span><span class="text">AI Career</span></a></li>
                <div class="indicator"></div>
            </ul>
        </nav>
    </div>
</header>
<main class="main-career">
    <div class="container">
        <div class="chat-card">
            <div class="chat-header">
                <div class="header-info"><i class="fa-solid fa-robot" style="font-size:28px;color:#007AFF"></i><div><h2>AI Career Advisor</h2><p>Trợ lý tư vấn nghề nghiệp</p></div></div>
                <button class="btn-reset" id="resetChatBtn"><i class="fa-regular fa-trash-can"></i> Xóa lịch sử</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <textarea id="userInput" rows="1" placeholder="Nhập câu hỏi (Enter để gửi)..."></textarea>
                <button id="sendBtn" class="btn-send"><i class="fa-regular fa-paper-plane"></i> Gửi</button>
            </div>
        </div>
    </div>
</main>
<script>
document.addEventListener('DOMContentLoaded',()=>{
    const sendBtn=document.getElementById('sendBtn');
    const userInput=document.getElementById('userInput');
    const chatMessages=document.getElementById('chatMessages');
    const resetBtn=document.getElementById('resetChatBtn');
    const addMessage=(text,isUser)=>{
        const div=document.createElement('div');
        div.className=`message ${isUser?'user':''}`;
        div.innerHTML=`<div class="avatar"><i class="fa-regular ${isUser?'fa-user':'fa-brain'}"></i></div><div class="content"><p>${escapeHtml(text)}</p></div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop=chatMessages.scrollHeight;
    };
    const escapeHtml=(s)=>s.replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});
    const sendMessage=async()=>{
        const txt=userInput.value.trim();
        if(!txt)return;
        addMessage(txt,true);
        userInput.value='';
        const typing=document.createElement('div');
        typing.className='message';
        typing.innerHTML='<div class="avatar"><i class="fa-solid fa-brain"></i></div><div class="content"><p><i class="fa-regular fa-spinner fa-pulse"></i> AI đang suy nghĩ...</p></div>';
        chatMessages.appendChild(typing);
        chatMessages.scrollTop=chatMessages.scrollHeight;
        try{
            const res=await fetch('/api/career-ai',{
                method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({message:txt})
            });
            const data=await res.json();
            typing.remove();
            if(data.success) addMessage(data.reply,false);
            else addMessage("Lỗi: "+data.error,false);
        }catch(e){
            typing.remove();
            addMessage("Lỗi kết nối server.",false);
        }
    };
    sendBtn.onclick=sendMessage;
    userInput.addEventListener('keypress',(e)=>{
        if(e.key==='Enter' && !e.shiftKey){
            e.preventDefault();
            sendMessage();
        }
    });
    resetBtn.onclick=()=>{
        if(confirm('Xóa lịch sử chat?')){
            chatMessages.innerHTML='';
            addMessage("Chào bạn! Hãy hỏi tôi về ngành học, trường đại học, hướng nghiệp...",false);
        }
    };
    addMessage("Chào bạn! Hãy hỏi tôi về ngành học, trường đại học, hướng nghiệp...",false);
    // Indicator
    const list=document.querySelectorAll('.list'),ind=document.querySelector('.indicator'),nav=document.querySelector('.navigation');
    if(ind){
        const moveTo=(el,transition='0.3s')=>{if(!el)return;ind.style.transition=`transform ${transition} ease-out`;ind.style.transform=`translateX(${el.offsetLeft}px)`;};
        const reset=()=>{const a=document.querySelector('.list.active');if(a)moveTo(a);};
        list.forEach(i=>i.addEventListener('mouseenter',()=>moveTo(i,'0.2s')));
        if(nav)nav.addEventListener('mouseleave',reset);
        window.addEventListener('resize',reset);
        reset();
    }
});
</script>
</body>
</html>
<script src="/script.js"></script>
<script src="/career/chat.js"></script>
</body>
</html>
