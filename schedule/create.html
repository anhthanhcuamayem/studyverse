<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StudyVerse - Lịch học thông minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* === GIỐNG TRANG CHỦ === */
        :root {
            --bg-color: #05070a;
            --card-bg: #0d1117;
            --primary-blue: #007AFF;
            --text-white: #ffffff;
            --text-gray: rgba(255, 255, 255, 0.6);
            --border-soft: rgba(255, 255, 255, 0.08);
            --white-glow: 0 10px 30px -5px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.03);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            overflow-x: hidden;
        }
        .navbar {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            height: 115px;
            background: rgba(5, 7, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            align-items: flex-end;
            padding-bottom: 10px;
            z-index: 1000;
        }
        .nav-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 40px;
            font-weight: 800;
            text-decoration: none;
            color: var(--text-white);
        }
        .logo span {
            color: var(--primary-blue);
        }
        .navigation {
            position: relative;
            width: 350px;
            height: 70px;
            background: var(--card-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 14px;
            border: 1px solid var(--border-soft);
        }
        .navigation ul {
            display: flex;
            position: relative;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .navigation ul li {
            position: relative;
            list-style: none;
            width: 70px;
            height: 70px;
            z-index: 10;
        }
        .navigation ul li a {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            text-align: center;
            font-weight: 500;
            color: #fff;
            text-decoration: none;
        }
        .navigation ul li a .icon {
            position: relative;
            display: block;
            line-height: 75px;
            font-size: 1.5em;
            text-align: center;
            transition: 0.5s;
            color: #fff;
            z-index: 1000;
        }
        .navigation ul li a .text {
            position: absolute;
            font-weight: 400;
            font-size: 0.75em;
            letter-spacing: 0.05em;
            transition: 0.5s;
            opacity: 0;
            transform: translateY(20px);
            z-index: 100;
        }
        .navigation ul li:hover a .icon,
        .navigation ul li.active a .icon {
            transform: translateY(-35px) !important;
            color: #fff !important;
        }
        .navigation ul li:hover a .text,
        .navigation ul li.active a .text {
            opacity: 1;
            transform: translateY(10px);
        }
        .indicator {
            position: absolute;
            top: -50%;
            width: 70px;
            height: 70px;
            background: var(--primary-blue);
            border-radius: 50%;
            border: 6px solid #05070a;
            transition: transform 0.5s ease-out;
            z-index: 1;
        }
        .main-schedule {
            padding-top: 160px;
            padding-bottom: 60px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .schedule-card {
            background: var(--card-bg);
            border: 1px solid var(--border-soft);
            border-radius: 32px;
            padding: 28px 30px;
            box-shadow: var(--white-glow);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, var(--primary-blue));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .intro-text {
            color: var(--text-gray);
            margin-bottom: 28px;
            font-size: 1rem;
            line-height: 1.5;
            border-left: 3px solid var(--primary-blue);
            padding-left: 16px;
        }
        .subjects-panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            justify-content: space-between;
        }
        .subjects-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .subject-badge {
            background: rgba(0, 122, 255, 0.2);
            border: 1px solid rgba(0, 122, 255, 0.5);
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .subject-badge button {
            background: #ff4d4d;
            border: none;
            color: white;
            border-radius: 30px;
            width: 22px;
            height: 22px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .add-subject-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .add-subject-form input {
            background: #1e1e2f;
            border: 1px solid var(--border-soft);
            padding: 10px 14px;
            border-radius: 16px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .add-subject-form input:focus {
            border-color: var(--primary-blue);
        }
        button, .btn-main {
            background: var(--primary-blue);
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4);
        }
        .ai-btn {
            background: linear-gradient(135deg, #007AFF, #5e2a84);
        }
        .clear-btn {
            background: rgba(255, 77, 77, 0.9);
        }
        .timetable-container {
            overflow-x: auto;
            margin: 28px 0 20px;
            border-radius: 24px;
            border: 1px solid var(--border-soft);
            background: #0a0e14;
        }
        .timetable {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 800px;
        }
        .timetable th, .timetable td {
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 8px;
            text-align: center;
            vertical-align: middle;
        }
        .timetable th {
            background: #0f131c;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .timetable th:hover {
            background: var(--primary-blue);
        }
        .timetable td {
            background: #0d1117;
            color: var(--text-gray);
            cursor: pointer;
        }
        .timetable td:hover {
            background: #1a1f2a;
        }
        .timetable td.disabled-day {
            background: repeating-linear-gradient(45deg, #1e1e2a, #1e1e2a 12px, #15171f 12px, #15171f 24px);
            cursor: not-allowed;
        }
        .timetable td.x-mark {
            background: #2a1215;
            position: relative;
        }
        .timetable td.x-mark::after {
            content: "✗";
            font-size: 1.4rem;
            font-weight: bold;
            color: #ff6b6b;
            display: block;
        }
        .timetable td.subject-cell {
            background: rgba(0, 122, 255, 0.2);
            font-weight: 600;
            color: white;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin: 16px 0 20px;
            font-size: 0.8rem;
            color: var(--text-gray);
        }
        .legend span {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 8px;
            margin-right: 8px;
            vertical-align: middle;
        }
        .status {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 16px 20px;
            margin-top: 24px;
            font-size: 0.9rem;
            border-left: 4px solid var(--primary-blue);
        }
        /* Modal chọn môn (floating buttons) */
        .subject-picker {
            position: absolute;
            background: #1e1e2f;
            border: 1px solid var(--border-soft);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 2000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            min-width: 180px;
        }
        .subject-picker button {
            background: rgba(0, 122, 255, 0.2);
            border: 1px solid rgba(0, 122, 255, 0.5);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: none;
        }
        .subject-picker button:hover {
            background: var(--primary-blue);
            transform: scale(1.02);
        }
        .subject-picker .x-btn {
            background: rgba(255, 77, 77, 0.2);
            border-color: #ff4d4d;
            color: #ff9999;
        }
        .subject-picker .x-btn:hover {
            background: #ff4d4d;
            color: white;
        }
        @media (max-width: 900px) {
            .navbar { height: 90px; }
            .main-schedule { padding-top: 130px; }
            .logo { font-size: 28px; }
            .navigation { width: 280px; height: 55px; }
            .navigation ul li { width: 56px; height: 55px; }
            .navigation ul li a .icon { font-size: 1.2rem; line-height: 55px; }
            .navigation ul li.active a .icon,
            .navigation ul li:hover a .icon { transform: translateY(-28px) !important; }
            .indicator { width: 55px; height: 55px; top: -40%; }
            button { padding: 8px 20px; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="nav-container">
        <a href="/" class="logo">Study<span>verse</span></a>
        <nav class="navigation">
            <ul>
                <li class="list" data-index="0">
                    <a href="/index.html">
                        <span class="icon"><i class="fa-solid fa-house"></i></span>
                        <span class="text">Home</span>
                    </a>
                </li>
                <li class="list" data-index="1">
                    <a href="/todo/mylist.html">
                        <span class="icon"><i class="fa-solid fa-list-check"></i></span>
                        <span class="text">My project</span>
                    </a>
                </li>
                <li class="list active" data-index="2">
                    <a href="#">
                        <span class="icon"><i class="fa-regular fa-calendar"></i></span>
                        <span class="text">Schedule</span>
                    </a>
                </li>
                <div class="indicator"></div>
            </ul>
        </nav>
    </div>
</header>

<main class="main-schedule">
    <div class="container">
        <div class="schedule-card">
            <h1><i class="fa-regular fa-calendar-alt"></i> Lịch học tương tác</h1>
            <div class="intro-text">
                👉 Click vào <strong>cột ngày</strong> để bật/tắt nghỉ cả ngày.<br>
                👉 Click vào <strong>ô tiết học</strong> → chọn môn từ danh sách nút hiện ra.<br>
                👉 Mỗi môn có giới hạn số tiết, nút môn sẽ chỉ xuất hiện nếu còn tiết.
            </div>

            <div class="subjects-panel" id="subjects-panel">
                <div class="subjects-list" id="subjects-list"></div>
                <div class="add-subject-form">
                    <input type="text" id="new-subject-name" placeholder="Tên môn học" autocomplete="off">
                    <input type="number" id="new-subject-sessions" placeholder="Số tiết" min="1" value="2" style="width: 100px;">
                    <button id="add-subject-btn"><i class="fa-solid fa-plus-circle"></i> Thêm môn</button>
                </div>
            </div>

            <div class="timetable-container">
                <table class="timetable" id="timetable">
                    <thead id="table-header"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>

            <div class="legend">
                <div><span style="background:#007AFF33; border:1px solid #007AFF;"></span> Đã xếp môn</div>
                <div><span style="background:#2a1215;"></span> Đánh dấu ✗ (không học)</div>
                <div><span style="background: repeating-linear-gradient(45deg, #1e1e2a, #1e1e2a 12px, #15171f 12px, #15171f 24px);"></span> Cả ngày nghỉ</div>
            </div>

            <div style="display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px;">
                <button class="ai-btn" id="auto-schedule"><i class="fa-solid fa-robot"></i> AI tự động xếp lịch</button>
                <button class="clear-btn" id="clear-all"><i class="fa-solid fa-trash-can"></i> Xóa toàn bộ</button>
            </div>

            <div id="status" class="status"></div>
        </div>
    </div>
</main>

<script>
    // ===== INDICATOR SLIDING =====
    (function() {
        const navItems = document.querySelectorAll('.navigation ul .list');
        const indicator = document.querySelector('.indicator');
        const navBar = document.querySelector('.navigation');
        if (!indicator || !navItems.length) return;
        function moveIndicatorTo(element) {
            if (!element) return;
            const leftPos = element.offsetLeft;
            indicator.style.transition = 'transform 0.5s ease-out';
            indicator.style.transform = `translateX(${leftPos}px)`;
        }
        function refreshIndicator() {
            const activeItem = document.querySelector('.navigation ul .list.active');
            if (activeItem) moveIndicatorTo(activeItem);
        }
        navItems.forEach(item => {
            item.addEventListener('mouseenter', () => moveIndicatorTo(item));
        });
        if (navBar) navBar.addEventListener('mouseleave', refreshIndicator);
        window.addEventListener('resize', refreshIndicator);
        refreshIndicator();
    })();

    // ===== LOGIC LỊCH HỌC =====
    const lessonSlots = [
        "07:00", "07:45", "08:30", "09:15", "10:00", "10:45",
        "13:00", "13:45", "14:30", "15:15", "16:00", "16:45"
    ];
    const days = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "Chủ nhật"];

    let timetableData = [];
    let disabledDays = new Array(7).fill(false);
    let subjects = [];
    let subjectCounts = {};

    let currentPicker = null;

    function closePicker() {
        if (currentPicker) {
            currentPicker.remove();
            currentPicker = null;
        }
    }

    function getEndTime(startTime) {
        let [h, m] = startTime.split(':').map(Number);
        let total = h*60 + m + 45;
        let nh = Math.floor(total/60);
        let nm = total % 60;
        return `${nh.toString().padStart(2,'0')}:${nm.toString().padStart(2,'0')}`;
    }

    function initTimetable() {
        timetableData = [];
        for (let i = 0; i < days.length; i++) {
            timetableData[i] = new Array(lessonSlots.length).fill(null);
        }
        renderTable();
    }

    function renderTable() {
        const thead = document.getElementById('table-header');
        const tbody = document.getElementById('table-body');
        let headerRow = `<tr><th>Giờ / Ngày</th>`;
        for (let i = 0; i < days.length; i++) {
            headerRow += `<th data-day="${i}">${days[i]}</th>`;
        }
        headerRow += `</tr>`;
        thead.innerHTML = headerRow;

        let bodyHtml = '';
        for (let s = 0; s < lessonSlots.length; s++) {
            const time = lessonSlots[s];
            const endTime = getEndTime(time);
            bodyHtml += `<tr><td style="background:#0f131c; font-weight:500;">${time} - ${endTime}</td>`;
            for (let d = 0; d < days.length; d++) {
                const cellData = timetableData[d][s];
                let cellClass = '';
                let content = '';
                if (disabledDays[d]) {
                    cellClass = 'disabled-day';
                    content = '🚫 Nghỉ';
                } else if (cellData) {
                    if (cellData.type === 'subject') {
                        cellClass = 'subject-cell';
                        content = cellData.name;
                    } else if (cellData.type === 'x') {
                        cellClass = 'x-mark';
                        content = '';
                    }
                } else {
                    content = '';
                }
                bodyHtml += `<td class="${cellClass}" data-day="${d}" data-slot="${s}">${content}</td>`;
            }
            bodyHtml += `</tr>`;
        }
        tbody.innerHTML = bodyHtml;

        document.querySelectorAll('th[data-day]').forEach(th => {
            th.style.cursor = 'pointer';
            th.addEventListener('click', (e) => {
                const day = parseInt(th.dataset.day);
                toggleDisableDay(day);
            });
        });
        document.querySelectorAll('td[data-day]').forEach(td => {
            td.addEventListener('click', (e) => {
                e.stopPropagation();
                const day = parseInt(td.dataset.day);
                const slot = parseInt(td.dataset.slot);
                if (disabledDays[day]) return;
                handleCellClick(day, slot, td);
            });
            td.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const day = parseInt(td.dataset.day);
                const slot = parseInt(td.dataset.slot);
                if (disabledDays[day]) return;
                toggleXMark(day, slot);
            });
        });
        updateStatus();
    }

    function toggleDisableDay(day) {
        disabledDays[day] = !disabledDays[day];
        if (disabledDays[day]) {
            for (let s = 0; s < lessonSlots.length; s++) {
                const cell = timetableData[day][s];
                if (cell && cell.type === 'subject') {
                    const subjName = cell.name;
                    if (subjectCounts[subjName] > 0) subjectCounts[subjName]--;
                }
                timetableData[day][s] = null;
            }
        }
        renderTable();
        closePicker();
    }

    function handleCellClick(day, slot, tdElement) {
        const current = timetableData[day][slot];
        if (current && current.type === 'subject') {
            const subjName = current.name;
            if (subjectCounts[subjName] > 0) subjectCounts[subjName]--;
            timetableData[day][slot] = null;
            renderTable();
            return;
        }
        if (current && current.type === 'x') {
            timetableData[day][slot] = null;
            renderTable();
            return;
        }
        showSubjectPicker(day, slot, tdElement);
    }

    function toggleXMark(day, slot) {
        const current = timetableData[day][slot];
        if (current && current.type === 'subject') {
            alert("Hãy xóa môn trước khi đánh dấu X.");
            return;
        }
        if (current && current.type === 'x') {
            timetableData[day][slot] = null;
        } else {
            timetableData[day][slot] = { type: 'x' };
        }
        renderTable();
    }

    function showSubjectPicker(day, slot, tdElement) {
        if (subjects.length === 0) {
            alert("Vui lòng thêm môn học trước!");
            return;
        }
        closePicker();

        const availableSubjects = subjects.filter(subj => (subjectCounts[subj.name] || 0) < subj.sessions);
        if (availableSubjects.length === 0 && subjects.length > 0) {
            alert("Tất cả các môn đã đủ số tiết! Không thể thêm môn mới.");
            return;
        }

        const pickerDiv = document.createElement('div');
        pickerDiv.className = 'subject-picker';

        availableSubjects.forEach(subj => {
            const btn = document.createElement('button');
            const remaining = subj.sessions - (subjectCounts[subj.name] || 0);
            btn.textContent = `${subj.name} (còn ${remaining} tiết)`;
            btn.onclick = (e) => {
                e.stopPropagation();
                if (timetableData[day][slot] !== null) {
                    alert("Ô này đã có nội dung, hãy xóa trước.");
                    closePicker();
                    return;
                }
                timetableData[day][slot] = { type: 'subject', name: subj.name };
                subjectCounts[subj.name] = (subjectCounts[subj.name] || 0) + 1;
                renderTable();
                closePicker();
            };
            pickerDiv.appendChild(btn);
        });

        const xBtn = document.createElement('button');
        xBtn.textContent = "✗ Không học";
        xBtn.className = 'x-btn';
        xBtn.onclick = (e) => {
            e.stopPropagation();
            toggleXMark(day, slot);
            closePicker();
        };
        pickerDiv.appendChild(xBtn);

        const cancelBtn = document.createElement('button');
        cancelBtn.textContent = "Hủy";
        cancelBtn.style.background = 'rgba(255,255,255,0.1)';
        cancelBtn.onclick = () => closePicker();
        pickerDiv.appendChild(cancelBtn);

        // Tính toán vị trí hiển thị: ưu tiên bên dưới, nếu không đủ chỗ thì bên trên
        const rect = tdElement.getBoundingClientRect();
        const pickerHeight = 150; // ước lượng chiều cao picker
        const spaceBelow = window.innerHeight - rect.bottom;
        let top, left;
        left = rect.left + window.scrollX;
        if (spaceBelow >= pickerHeight) {
            // hiện bên dưới
            top = rect.bottom + window.scrollY + 5;
        } else {
            // hiện bên trên
            top = rect.top + window.scrollY - pickerHeight - 5;
        }
        // Đảm bảo không tràn ngang
        if (left + 200 > window.innerWidth + window.scrollX) {
            left = window.innerWidth + window.scrollX - 220;
        }
        if (left < window.scrollX) left = window.scrollX + 5;

        pickerDiv.style.position = 'absolute';
        pickerDiv.style.left = `${left}px`;
        pickerDiv.style.top = `${top}px`;
        document.body.appendChild(pickerDiv);
        currentPicker = pickerDiv;

        // Đóng khi click ra ngoài
        const outsideClick = (e) => {
            if (!pickerDiv.contains(e.target)) {
                closePicker();
                document.removeEventListener('click', outsideClick);
            }
        };
        setTimeout(() => {
            document.addEventListener('click', outsideClick);
        }, 10);
    }

    function updateStatus() {
        let totalPlanned = 0, totalScheduled = 0;
        subjects.forEach(s => {
            const scheduled = subjectCounts[s.name] || 0;
            totalPlanned += s.sessions;
            totalScheduled += scheduled;
        });
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = `<strong>📊 Tiến độ:</strong> Đã xếp ${totalScheduled}/${totalPlanned} tiết. `;
        if (totalScheduled < totalPlanned) {
            statusDiv.innerHTML += `<span style="color:#ffaa33;">Còn thiếu ${totalPlanned - totalScheduled} tiết. Dùng AI để xếp tự động hoặc chọn thêm.</span>`;
        } else if (totalScheduled === totalPlanned && totalPlanned > 0) {
            statusDiv.innerHTML += `<span style="color:#2ecc71;">✅ Tuyệt vời! Bạn đã xếp đủ số tiết cho tất cả môn.</span>`;
        }
        subjects.forEach(s => {
            statusDiv.innerHTML += `<br> - ${s.name}: ${subjectCounts[s.name] || 0}/${s.sessions}`;
        });
    }

    function addSubject() {
        const nameInput = document.getElementById('new-subject-name');
        const sessInput = document.getElementById('new-subject-sessions');
        const name = nameInput.value.trim();
        const sessions = parseInt(sessInput.value);
        if (!name || isNaN(sessions) || sessions < 1) {
            alert("Tên môn hợp lệ và số tiết >0");
            return;
        }
        if (subjects.find(s => s.name === name)) {
            alert("Môn đã tồn tại");
            return;
        }
        subjects.push({ name, sessions });
        subjectCounts[name] = 0;
        nameInput.value = '';
        sessInput.value = '2';
        renderSubjectList();
        updateStatus();
        renderTable();
    }

    function renderSubjectList() {
        const container = document.getElementById('subjects-list');
        container.innerHTML = '';
        subjects.forEach(sub => {
            const span = document.createElement('span');
            span.className = 'subject-badge';
            span.innerHTML = `${sub.name} (${subjectCounts[sub.name] || 0}/${sub.sessions}) 
                <button onclick="removeSubject('${sub.name}')">✕</button>`;
            container.appendChild(span);
        });
    }

    window.removeSubject = function(name) {
        if (confirm(`Xóa môn ${name}? Các tiết đã xếp sẽ bị xóa.`)) {
            for (let d=0; d<days.length; d++) {
                for (let s=0; s<lessonSlots.length; s++) {
                    const cell = timetableData[d][s];
                    if (cell && cell.type === 'subject' && cell.name === name) {
                        timetableData[d][s] = null;
                    }
                }
            }
            subjects = subjects.filter(s => s.name !== name);
            delete subjectCounts[name];
            renderSubjectList();
            renderTable();
        }
    };

    function autoSchedule() {
        let needSchedule = [];
        subjects.forEach(subj => {
            let scheduled = subjectCounts[subj.name] || 0;
            let need = subj.sessions - scheduled;
            for (let i=0; i<need; i++) needSchedule.push(subj.name);
        });
        if (needSchedule.length === 0) {
            alert("Tất cả các môn đã đủ số tiết!");
            return;
        }
        let emptySlots = [];
        for (let d=0; d<days.length; d++) {
            if (disabledDays[d]) continue;
            for (let s=0; s<lessonSlots.length; s++) {
                if (timetableData[d][s] === null) emptySlots.push({day:d, slot:s});
            }
        }
        if (emptySlots.length < needSchedule.length) {
            alert(`Không đủ ô trống! Cần ${needSchedule.length} ô nhưng chỉ có ${emptySlots.length} ô trống.`);
            return;
        }
        for (let i=0; i<needSchedule.length; i++) {
            let subjName = needSchedule[i];
            let randomIndex = Math.floor(Math.random() * emptySlots.length);
            let {day, slot} = emptySlots[randomIndex];
            timetableData[day][slot] = { type: 'subject', name: subjName };
            subjectCounts[subjName]++;
            emptySlots.splice(randomIndex,1);
        }
        renderTable();
    }

    function clearAll() {
        if (confirm("Xóa toàn bộ lịch và reset môn?")) {
            initTimetable();
            subjects = [];
            subjectCounts = {};
            disabledDays.fill(false);
            renderSubjectList();
            updateStatus();
        }
    }

    initTimetable();
    document.getElementById('add-subject-btn').addEventListener('click', addSubject);
    document.getElementById('auto-schedule').addEventListener('click', autoSchedule);
    document.getElementById('clear-all').addEventListener('click', clearAll);
</script>
</body>
</html>
